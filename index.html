<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atlas OS</title>

<meta name="theme-color" content="#050816">

<link rel="manifest" href="manifest.json">

<!-- Police -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Icônes -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<!-- CSS -->

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Splash Screen -->

<div id="splash">

<div class="logo-container">

<div class="logo-circle">

<img src="assets/logo.svg" alt="Atlas OS">

</div>

<h1>Atlas OS</h1>

<p>

Chaque corps raconte une histoire.

<br>

Atlas veille à ce qu'elle ne soit jamais oubliée.

</p>

</div>

</div>

<!-- Application -->

<main id="app">

<header>

<div>

<small>Bienvenue</small>

<h2>Atlas OS</h2>

</div>

<div class="avatar">

<span class="material-symbols-rounded">

account_circle

</span>

</div>

</header>

<section class="hero-card">

<h1>

Bonjour.

<br>

Racontez-moi votre histoire.

</h1>

<p>

Je vous écoute.

</p>

<button id="startButton">

Commencer

</button>

</section>

<section class="cards">

<div class="card">

<h3>Score Biomécanique</h3>

<span>92</span>

</div>

<div class="card">

<h3>Récupération</h3>

<span>81%</span>

</div>

<div class="card">

<h3>Sommeil</h3>

<span>7 h 48</span>

</div>

<div class="card">

<h3>VFC</h3>

<span>62 ms</span>

</div>

</section>

</main>

<nav>

<button>

<span class="material-symbols-rounded">

home

</span>

Accueil

</button>

<button>

<span class="material-symbols-rounded">

chat

</span>

Atlas

</button>

<button>

<span class="material-symbols-rounded">

accessibility_new

</span>

Mon corps

</button>

<button>

<span class="material-symbols-rounded">

analytics

</span>

Analyse

</button>

<button>

<span class="material-symbols-rounded">

settings

</span>

Plus

</button>

</nav>

<script src="js/app.js"></script>

</body>

</html>
