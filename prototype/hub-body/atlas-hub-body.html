<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Atlas OS — Hub Body 0.8.0</title>
  <link rel="stylesheet" href="./css/atlas-hub-body.css">
</head>
<body>

<main class="atlas-viewport" id="atlasViewport">
  <section class="atlas-canvas" id="atlasCanvas" aria-label="Interface Atlas OS">

    <img
      class="atlas-reference"
      src="./assets/atlas-dashboard-reference.png"
      alt="Interface Atlas OS"
      draggable="false"
    >

    <button class="atlas-hotspot module module-health"
      data-title="Santé"
      data-text="Accédez à vos données cliniques, symptômes, examens et antécédents."
      aria-label="Santé"></button>

    <button class="atlas-hotspot module module-training"
      data-title="Entraînement"
      data-text="Consultez votre charge, vos séances et votre progression."
      aria-label="Entraînement"></button>

    <button class="atlas-hotspot module module-strength"
      data-title="Renforcement"
      data-text="Explorez les propositions de force, stabilité et tolérance à la charge."
      aria-label="Renforcement"></button>

    <button class="atlas-hotspot module module-mobility"
      data-title="Mobilité"
      data-text="Consultez vos amplitudes et routines de mobilité."
      aria-label="Mobilité"></button>

    <button class="atlas-hotspot module module-sleep"
      data-title="Sommeil"
      data-text="Analysez la durée, la qualité et la régularité du sommeil."
      aria-label="Sommeil"></button>

    <button class="atlas-hotspot module module-nutrition"
      data-title="Nutrition"
      data-text="Visualisez hydratation, énergie et recommandations nutritionnelles."
      aria-label="Nutrition"></button>

    <button class="atlas-hotspot module module-analysis"
      data-title="Analyse IA"
      data-text="Posez une question et obtenez une réponse contextualisée."
      aria-label="Analyse IA"></button>

    <button class="atlas-hotspot module module-progress"
      data-title="Progression"
      data-text="Suivez votre évolution et comparez les périodes."
      aria-label="Progression"></button>

    <button class="atlas-hotspot module module-lab"
      data-title="Laboratoire"
      data-text="Simulez des scénarios et observez leurs effets probables."
      aria-label="Laboratoire"></button>

    <button class="atlas-hotspot module module-goals"
      data-title="Objectifs"
      data-text="Définissez et suivez vos objectifs."
      aria-label="Objectifs"></button>

    <button class="atlas-hotspot body-point point-head"
      data-title="Crâne"
      data-text="Historique, symptômes, sensibilité, maux de tête et système nerveux."
      aria-label="Crâne"></button>

    <button class="atlas-hotspot body-point point-neck"
      data-title="Jonction crânio-cervicale"
      data-text="Mobilité cervicale, tensions musculaires et symptômes associés."
      aria-label="Jonction crânio-cervicale"></button>

    <button class="atlas-hotspot body-point point-shoulder-right"
      data-title="Épaule droite"
      data-text="Douleurs, mobilité, force, examens et antécédents."
      aria-label="Épaule droite"></button>

    <button class="atlas-hotspot body-point point-shoulder-left"
      data-title="Épaule gauche"
      data-text="Douleurs, mobilité, force, examens et antécédents."
      aria-label="Épaule gauche"></button>

    <button class="atlas-hotspot body-point point-elbow-right"
      data-title="Coude droit"
      data-text="Articulations, tendons, muscles et symptômes nerveux."
      aria-label="Coude droit"></button>

    <button class="atlas-hotspot body-point point-elbow-left"
      data-title="Coude gauche"
      data-text="Articulations, tendons, muscles et symptômes nerveux."
      aria-label="Coude gauche"></button>

    <button class="atlas-hotspot body-point point-lumbar"
      data-title="Lombaires"
      data-text="Historique lombaire, mobilité, force et douleurs associées."
      aria-label="Lombaires"></button>

    <button class="atlas-hotspot body-point point-hip-right"
      data-title="Hanche droite"
      data-text="Coxo-fémorale, mobilité, stabilité et douleurs."
      aria-label="Hanche droite"></button>

    <button class="atlas-hotspot body-point point-hip-left"
      data-title="Hanche gauche"
      data-text="Coxo-fémorale, mobilité, stabilité et douleurs."
      aria-label="Hanche gauche"></button>

    <button class="atlas-hotspot body-point point-knee-right"
      data-title="Genou droit"
      data-text="Articulations, tendons, charge et stabilité."
      aria-label="Genou droit"></button>

    <button class="atlas-hotspot body-point point-knee-left"
      data-title="Genou gauche"
      data-text="Articulations, tendons, charge et stabilité."
      aria-label="Genou gauche"></button>

    <button class="atlas-hotspot body-point point-ankle-right"
      data-title="Cheville droite"
      data-text="Mobilité, stabilité, tendons et tolérance à la charge."
      aria-label="Cheville droite"></button>

    <button class="atlas-hotspot body-point point-ankle-left"
      data-title="Cheville gauche"
      data-text="Mobilité, stabilité, tendons et tolérance à la charge."
      aria-label="Cheville gauche"></button>

    <button class="atlas-hotspot ask-hotspot"
      data-title="Demander à Atlas"
      data-text="Décrivez votre symptôme, votre objectif ou votre question."
      aria-label="Demander à Atlas"></button>

    <button class="atlas-hotspot pain-map-hotspot"
      data-title="Douleurs récentes"
      data-text="Ouvrez la cartographie des douleurs enregistrées."
      aria-label="Douleurs récentes"></button>

    <button class="atlas-hotspot timeline-hotspot"
      data-title="Chronologie de vie"
      data-text="Parcourez les événements, blessures, objectifs et périodes d'entraînement."
      aria-label="Chronologie de vie"></button>

  </section>
</main>

<dialog class="atlas-dialog" id="atlasDialog">
  <form method="dialog">
    <button class="dialog-close" aria-label="Fermer">×</button>
  </form>
  <p class="dialog-kicker">ATLAS OS</p>
  <h2 id="dialogTitle">Module</h2>
  <p id="dialogText"></p>
  <button class="dialog-action" id="dialogAction" type="button">Explorer</button>
</dialog>

<script src="./js/atlas-hub-body.js"></script>
</body>
</html>
