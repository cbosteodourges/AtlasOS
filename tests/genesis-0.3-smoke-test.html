<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Atlas Genesis 0.3.0</title><style>body{max-width:1000px;margin:36px auto;padding:0 20px;background:#07101f;color:#eaf6ff;font-family:system-ui}section{margin:20px 0;padding:20px;border:1px solid #31556a;border-radius:16px}pre{white-space:pre-wrap;overflow:auto}.ok{color:#8dffbd;font-weight:700}</style></head><body><h1>Atlas OS — Genesis 0.3.0</h1><p id="status">Tests en cours…</p><section><h2>Résultats</h2><pre id="out"></pre></section><script src="../src/human/human-context.js"></script><script src="../src/clinical/clinical-engine.js"></script><script src="../src/training/adaptive-training.js"></script><script>try{const ctx=AtlasHumanContext.create({dailyLife:{physicalDemand:65},recovery:{sleepQuality:72,stressLevel:45},motivation:{confidence:80}});const ready=AtlasHumanContext.calculateReadiness(ctx);const c=AtlasClinical.createCase({reasonForConsultation:"Débuter une activité sans se blesser"});const f1=AtlasClinical.addFactor(c,{category:"profession",label:"Charge professionnelle",weight:55});const f2=AtlasClinical.addFactor(c,{category:"recovery",label:"Récupération correcte",direction:"protective",weight:45});AtlasClinical.createHypothesis(c,{title:"Progression à surveiller",explanation:"La charge professionnelle réduit la réserve disponible.",supportingFactorIds:[f1.id],contradictingFactorIds:[f2.id]});AtlasClinical.addRecommendation(c,{category:"training",title:"Commencer progressivement",explanation:"Associer marche-course, renforcement et mobilité.",priority:5});const p=AtlasAdaptiveTraining.createProfile({experienceLevel:"beginner",currentWeeklyVolume:60,previousWeeklyVolume:50,strengthSessions:0,mobilitySessions:1,recoveryScore:68,painScore:1,readinessScore:ready.score});const result={human:{ctx,ready},clinical:{case:c,summary:AtlasClinical.buildClinicalSummary(c)},training:{profile:p,guidance:AtlasAdaptiveTraining.buildWee
